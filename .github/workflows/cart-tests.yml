name: Cart Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-cart:
    name: Cart unit, component, and E2E tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Cart Unit and Component Tests (Vitest)
        working-directory: frontend
        run: >
          npm run test -- --run --reporter=verbose
          src/tests/utils/cartValidation.test.ts
          src/tests/components/Cart.integration.test.tsx
          src/tests/components/Cart.mock.test.tsx

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Cart E2E Tests (Playwright)
        working-directory: frontend
        run: npx playwright test e2e/cart.e2e.spec.ts

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cart-playwright-report
          path: frontend/playwright-report/
          retention-days: 30
