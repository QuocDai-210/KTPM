spring:
  application:
    name: shopcart-backend
  config:
    import: classpath:database/application-database.yaml
  security:
    user:
      name: admin
      password: admin123
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.shopcart: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
